<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  @font-face {
    font-family: "Satoshi Variable";
    src: url("./fonts/Satoshi-Variable.woff2") format("woff2");
    font-weight: 300 900;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: "Cabin";
    src: url("./fonts/Cabin-Bold.woff") format("woff");
    font-weight: 700;
    font-style: normal;
    font-display: block;
  }
  html, body {
    margin: 0; padding: 0;
    width: 1920px; height: 1080px;
    overflow: hidden;
  }
  body {
    background: #1e3460;
    font-family: "Satoshi Variable", sans-serif;
    color: #fdfbf4;
  }
  #root {
    width: 1920px;
    height: 1080px;
    position: relative;
  }
  .scene {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: #1e3460;
  }
  #c1  { z-index: 1; }
  #c2  { z-index: 2; }
  #c3  { z-index: 3; }
  #c4  { z-index: 4; }
  #c5  { z-index: 5; }
  #c6  { z-index: 6; }
  #c7  { z-index: 7; }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-width="1920" data-height="1080" data-start="0" data-duration="66">
  <!-- Cena 01: Abertura (0-6s) -->
  <div id="c1" class="scene clip" data-composition-id="cena-01" data-composition-src="compositions/cena-01-abertura.html" data-start="0" data-duration="6" data-track-index="10" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 02: Conceito (6-15s) — VO: 7-14.2s -->
  <div id="c2" class="scene clip" data-composition-id="cena-02" data-composition-src="compositions/cena-02-conceito.html" data-start="6" data-duration="9" data-track-index="11" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 03: Público (15-25s) — VO: 16-24.5s -->
  <div id="c3" class="scene clip" data-composition-id="cena-03" data-composition-src="compositions/cena-03-publico.html" data-start="15" data-duration="10" data-track-index="10" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 04: Diferenciais (25-33s) — VO: 26-32.6s -->
  <div id="c4" class="scene clip" data-composition-id="cena-04" data-composition-src="compositions/cena-04-diferenciais.html" data-start="25" data-duration="8" data-track-index="11" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 05: Lollapalooza (33-45s) — VO: 34-44.9s -->
  <div id="c5" class="scene clip" data-composition-id="cena-05" data-composition-src="compositions/cena-05-lollapalooza.html" data-start="33" data-duration="12" data-track-index="10" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 06: Técnica (45-59s) — VO: 46-58.5s -->
  <div id="c6" class="scene clip" data-composition-id="cena-06" data-composition-src="compositions/cena-06-tec.html" data-start="45" data-duration="14" data-track-index="11" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Cena 07: Fechamento (59-66s) — VO: 60-65.9s -->
  <div id="c7" class="scene clip" data-composition-id="cena-07" data-composition-src="compositions/cena-07-fechamento.html" data-start="59" data-duration="7" data-track-index="10" data-layout-allow-overflow="" style="z-index: 3"></div>

  <!-- Background music -->
  <audio id="bg-music" class="clip" data-start="0" data-duration="66" data-track-index="0" src="assets/kornevmusic-upbeat-happy-corporate-487426-full.mp3" data-volume="0.07" style="z-index: 1"></audio>

  <!-- Voiceover tracks (all on track 1, non-overlapping) -->
  <audio id="voice-c2" class="clip" data-start="7" data-duration="7.2" data-track-index="1" src="assets/voice-cena-02.mp3" data-volume="1" style="z-index: 2"></audio>
  <audio id="voice-c3" class="clip" data-start="16" data-duration="8.5" data-track-index="1" src="assets/voice-cena-03.mp3" data-volume="1" style="z-index: 2"></audio>
  <audio id="voice-c4" class="clip" data-start="26" data-duration="6.6" data-track-index="1" src="assets/voice-cena-04.mp3" data-volume="1" style="z-index: 2"></audio>
  <audio id="voice-c5" class="clip" data-start="34" data-duration="10.9" data-track-index="1" src="assets/voice-cena-05.mp3" data-volume="1" style="z-index: 2"></audio>
  <audio id="voice-c6" class="clip" data-start="46" data-duration="12.5" data-track-index="1" src="assets/voice-cena-06.mp3" data-volume="1" style="z-index: 2"></audio>
  <audio id="voice-c7" class="clip" data-start="60" data-duration="5.9" data-track-index="1" src="assets/voice-cena-07.mp3" data-volume="1" style="z-index: 2"></audio>
</div>

<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

function glitchTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.to(oldId, { skewX: 8, scale: 1.02, duration: 0.03, ease: "none" }, T);
  tl.to(oldId, { skewX: -6, scale: 0.99, duration: 0.03, ease: "none" }, T + 0.03);
  tl.to(oldId, { skewX: 4, scale: 1.01, duration: 0.03, ease: "none" }, T + 0.06);
  tl.to(oldId, { skewX: 0, scale: 0.95, autoAlpha: 0, filter: "blur(6px)", duration: half - 0.09, ease: "power2.in" }, T + 0.09);
  tl.set(newId, { opacity: 0, scale: 1.05, filter: "blur(6px)" }, T);
  tl.to(newId, { opacity: 1, scale: 1, filter: "blur(0px)", duration: half, ease: "power3.out" }, T + half);
}

function slideTransition(oldId, newId, T, dur, dir) {
  var half = dur / 2;
  var xOut = dir === "left" ? -1920 : dir === "right" ? 1920 : 0;
  var yOut = dir === "up" ? -1080 : dir === "down" ? 1080 : 0;
  var xIn = dir === "left" ? 1920 : dir === "right" ? -1920 : 0;
  var yIn = dir === "up" ? 1080 : dir === "down" ? -1080 : 0;
  tl.set(newId, { opacity: 0, x: xIn, y: yIn, filter: "blur(8px)", scale: 1 }, T);
  tl.to(oldId, { x: xOut, y: yOut, filter: "blur(8px)", autoAlpha: 0, duration: half, ease: "power3.in" }, T);
  tl.to(newId, { x: 0, y: 0, filter: "blur(0px)", opacity: 1, duration: half, ease: "power3.out" }, T + half);
}

function zoomTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.set(newId, { opacity: 0, scale: 0.6, filter: "blur(10px)" }, T);
  tl.set(oldId, { zIndex: 10 }, T);
  tl.to(oldId, { scale: 1.8, autoAlpha: 0, filter: "blur(10px)", duration: half, ease: "power3.in" }, T);
  tl.to(newId, { scale: 1, opacity: 1, filter: "blur(0px)", duration: half, ease: "power3.out" }, T + half);
  tl.set(oldId, { zIndex: "auto" }, T + dur);
  tl.set(newId, { zIndex: "auto" }, T + dur);
}

function crossfadeTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.set(newId, { opacity: 0, filter: "blur(4px)", scale: 1 }, T);
  tl.to(oldId, { autoAlpha: 0, filter: "blur(4px)", duration: half, ease: "power2.in" }, T);
  tl.to(newId, { opacity: 1, filter: "blur(0px)", duration: half, ease: "power2.out" }, T + half);
}

// C1 → C2 @ 6s: Crossfade
crossfadeTransition("#c1", "#c2", 6, 0.4);
// C2 → C3 @ 15s: Crossfade
crossfadeTransition("#c2", "#c3", 15, 0.4);
// C3 → C4 @ 25s: Crossfade
crossfadeTransition("#c3", "#c4", 25, 0.4);
// C4 → C5 @ 33s: Glitch (high-energy cut to Lollapalooza)
glitchTransition("#c4", "#c5", 33, 0.4);
// C5 → C6 @ 45s: Crossfade
crossfadeTransition("#c5", "#c6", 45, 0.4);
// C6 → C7 @ 59s: Slide down
slideTransition("#c6", "#c7", 59, 0.4, "down");

window.__timelines["main"] = tl;
</script>
</body>
</html>
