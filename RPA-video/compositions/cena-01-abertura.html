<template id="cena-01-template">
  <div id="cena-01" data-composition-id="cena-01" data-start="0" data-width="1920" data-height="1080">
    <style>
      #cena-01 {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1e3460;
        font-family: "Satoshi Variable", sans-serif;
        color: #fdfbf4;
        position: relative;
      }
      .grid-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.12;
      }
      .grid-line {
        stroke: #fdfbf4;
        stroke-width: 1;
      }
      .particle {
        fill: #fdfbf4;
      }
      .scene-content {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 80px 120px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        background: rgba(30, 52, 96, 0.4);
      }
      .keyword {
        font-size: 80px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.03em;
        line-height: 1;
        position: absolute;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }
      .keyword-left {
        left: 120px;
        top: 280px;
      }
      .keyword-right {
        right: 120px;
        top: 280px;
        text-align: right;
      }
      .keyword-center {
        top: 460px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 120px;
      }
      .title-main {
        font-size: 72px;
        font-weight: 900;
        text-align: center;
        line-height: 1.1;
        letter-spacing: -0.02em;
        max-width: 1400px;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
        position: absolute;
        top: 380px;
        left: 50%;
        transform: translateX(-50%);
      }
      .title-subtitle {
        display: block;
        font-size: 36px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(253, 251, 244, 0.7);
        margin-top: 12px;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
      }
      .meta-label {
        font-family: "Cabin", sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(253, 251, 244, 0.8);
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
      }
      .corner-accent {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 2px solid rgba(253, 251, 244, 0.2);
      }
      .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
      .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
      .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
      .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
    </style>

    <svg class="grid-bg" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <defs>
        <pattern id="grid-pattern" width="120" height="120" patternUnits="userSpaceOnUse">
          <path d="M 120 0 L 0 0 0 120" fill="none" class="grid-line" opacity="0.4"/>
        </pattern>
      </defs>
      <rect width="1920" height="1080" fill="url(#grid-pattern)"/>
      <!-- Particles -->
      <circle class="particle p1" cx="200" cy="200" r="3" opacity="0.6"/>
      <circle class="particle p2" cx="500" cy="350" r="4" opacity="0.4"/>
      <circle class="particle p3" cx="900" cy="150" r="2" opacity="0.7"/>
      <circle class="particle p4" cx="1300" cy="400" r="3" opacity="0.5"/>
      <circle class="particle p5" cx="1600" cy="250" r="4" opacity="0.6"/>
      <circle class="particle p6" cx="300" cy="700" r="3" opacity="0.5"/>
      <circle class="particle p7" cx="700" cy="850" r="2" opacity="0.7"/>
      <circle class="particle p8" cx="1100" cy="750" r="3" opacity="0.4"/>
      <circle class="particle p9" cx="1500" cy="900" r="4" opacity="0.6"/>
      <circle class="particle p10" cx="1700" cy="650" r="3" opacity="0.5"/>
      <!-- Connection lines -->
      <line class="grid-line conn" x1="200" y1="200" x2="500" y2="350" opacity="0.2"/>
      <line class="grid-line conn" x1="500" y1="350" x2="900" y2="150" opacity="0.15"/>
      <line class="grid-line conn" x1="900" y1="150" x2="1300" y2="400" opacity="0.2"/>
      <line class="grid-line conn" x1="1300" y1="400" x2="1600" y2="250" opacity="0.15"/>
      <line class="grid-line conn" x1="300" y1="700" x2="700" y2="850" opacity="0.2"/>
      <line class="grid-line conn" x1="700" y1="850" x2="1100" y2="750" opacity="0.15"/>
      <line class="grid-line conn" x1="1100" y1="750" x2="1500" y2="900" opacity="0.2"/>
      <line class="grid-line conn" x1="1500" y1="900" x2="1700" y2="650" opacity="0.15"/>
    </svg>

    <div class="corner-accent corner-tl"></div>
    <div class="corner-accent corner-tr"></div>
    <div class="corner-accent corner-bl"></div>
    <div class="corner-accent corner-br"></div>

    <div class="scene-content">
      <div class="keyword keyword-left" id="c1-inovacao">INOVAÇÃO</div>
      <div class="keyword keyword-right" id="c1-escala">ESCALABILIDADE</div>
      <div class="keyword keyword-center" id="c1-impacto">IMPACTO</div>
      <div class="title-main" id="c1-titulo">Colaboradores Digitais<span class="title-subtitle">Resultados e Evolução 2026</span></div>
      <div class="meta-label" id="c1-meta">Soluções Digitais — DTI</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 10.3;

      // Ambient particle pulse
      var particles = document.querySelectorAll(".particle");
      particles.forEach(function(p, i) {
        tl.fromTo(p, { opacity: 0.2, scale: 0.8 }, { opacity: 0.7, scale: 1.2, duration: 2, ease: "sine.inOut", repeat: Math.floor(beat / 2) - 1, yoyo: true }, i * 0.2);
      });

      // Connection lines draw
      tl.fromTo(".conn", { opacity: 0 }, { opacity: 0.25, duration: 1.5, ease: "power2.out", stagger: 0.1 }, 0);

      // Corner accents
      tl.fromTo(".corner-accent", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: "back.out(1.4)", stagger: 0.08 }, 0.2);

      // Keywords entrance — varied directions and eases
      tl.fromTo("#c1-inovacao", { x: -120, opacity: 0 }, { x: 0, opacity: 1, duration: 0.7, ease: "expo.out" }, 0.4);
      tl.fromTo("#c1-escala", { x: 120, opacity: 0 }, { x: 0, opacity: 1, duration: 0.7, ease: "expo.out" }, 0.5);
      tl.fromTo("#c1-impacto", { y: 60, opacity: 0, scale: 0.9 }, { y: 0, opacity: 1, scale: 1, duration: 0.8, ease: "power3.out" }, 0.7);

      // Keywords exit to form title
      tl.to("#c1-inovacao", { opacity: 0, y: -40, duration: 0.6, ease: "power2.in" }, 3.5);
      tl.to("#c1-escala", { opacity: 0, y: -40, duration: 0.6, ease: "power2.in" }, 3.7);
      tl.to("#c1-impacto", { opacity: 0, y: -40, scale: 0.9, duration: 0.6, ease: "power2.in" }, 3.9);

      // Title entrance
      tl.fromTo("#c1-titulo", { opacity: 0, scale: 0.85, y: 30 }, { opacity: 1, scale: 1, y: 0, duration: 1.2, ease: "power3.out" }, 4.7);

      // Meta label
      tl.fromTo("#c1-meta", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 6.0);

      // Hold title with subtle breath
      tl.to("#c1-titulo", { scale: 1.02, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.0);

      window.__timelines["cena-01"] = tl;
    </script>
  </div>
</template>
