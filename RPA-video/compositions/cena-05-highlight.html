<template id="cena-05-template">
  <div id="cena-05" data-composition-id="cena-05" data-start="0" data-width="1920" data-height="1080">
    <style>
      #cena-05 {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1e3460;
        font-family: "Satoshi Variable", sans-serif;
        color: #fdfbf4;
        position: relative;
      }
      .scene-content {
        width: 100%;
        height: 100%;
        padding: 80px 120px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        background: rgba(30, 52, 96, 0.4);
      }
      .big-counter {
        font-size: 160px;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        letter-spacing: -0.03em;
        background: rgba(30, 52, 96, 0.85);
        padding: 8px 24px;
        border-radius: 8px;
        display: inline-block;
      }
      .typewriter-line {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(253, 251, 244, 0.85);
        min-height: 48px;
      }
      .tags-row {
        display: flex;
        gap: 24px;
        margin-top: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tag {
        font-size: 22px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 14px 28px;
        border: 2px solid rgba(253, 251, 244, 0.3);
        border-radius: 8px;
        background: rgba(30, 52, 96, 0.85);
      }
      .shock-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        border-radius: 50%;
        border: 2px solid rgba(14, 106, 192, 0.4);
        pointer-events: none;
      }
    </style>

    <div class="shock-ring" id="c5-ring1"></div>
    <div class="shock-ring" id="c5-ring2" style="width: 800px; height: 800px; opacity: 0.6;"></div>

    <div class="scene-content">
      <div class="big-counter" id="c5-counter">R$ 899.000</div>
      <div class="typewriter-line" id="c5-subtitle"></div>
      <div class="tags-row">
        <div class="tag" id="c5-t1">AGILIDADE</div>
        <div class="tag" id="c5-t2">MENOS ERROS</div>
        <div class="tag" id="c5-t3">MAIS VALOR</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 15.22;

      // Shock rings expand
      tl.fromTo("#c5-ring1", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.8, ease: "power3.out" }, 0.5);
      tl.fromTo("#c5-ring2", { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.6, duration: 1.0, ease: "power3.out" }, 0.7);
      tl.to("#c5-ring1", { scale: 1.6, opacity: 0, duration: 1.5, ease: "power2.out" }, 1.3);
      tl.to("#c5-ring2", { scale: 1.8, opacity: 0, duration: 1.8, ease: "power2.out" }, 1.7);

      // Counter — animate from 0 using proxy
      var counterProxy = { val: 0 };
      var counterEl = document.getElementById("c5-counter");
      tl.fromTo(counterProxy, { val: 0 }, {
        val: 899000,
        duration: 2.5,
        ease: "power2.out",
        onUpdate: function() {
          counterEl.textContent = "R$ " + Math.floor(counterProxy.val).toLocaleString("pt-BR");
        }
      }, 1.5);

      // Typewriter subtitle
      var subtitleText = "EM SAVINGS E COST AVOIDANCE";
      var subEl = document.getElementById("c5-subtitle");
      var chars = subtitleText.split("");
      chars.forEach(function(ch, i) {
        tl.call(function() {
          subEl.textContent += ch;
        }, null, 5.0 + i * 0.06);
      });

      // Tags pop in staggered
      tl.fromTo("#c5-t1", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.6)" }, 9.0);
      tl.fromTo("#c5-t2", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.6)" }, 9.4);
      tl.fromTo("#c5-t3", { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.7, ease: "back.out(1.6)" }, 9.8);

      // Hold with subtle counter breath
      tl.to("#c5-counter", { scale: 1.03, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 12);

      window.__timelines["cena-05"] = tl;
    </script>
  </div>
</template>
