    <div class="ring-container" id="c6-ring">
      <div class="center-circle" id="c6-center">FORÇA<br/>TOTAL</div>
      <div class="ring-word" id="c6-w1" style="transform: translate(-50%, -50%) rotate(0deg) translateY(-220px);">DISCIPLINA</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      var beat = 20.14;

      // Header
      tl.fromTo("#c6-header", { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 0.5);

      // Pillars slide in from left, staggered
      var pillars = ["#c6-p1", "#c6-p2", "#c6-p3", "#c6-p4", "#c6-p5"];
      pillars.forEach(function(sel, i) {
        tl.fromTo(sel, { x: -120, opacity: 0 }, { x: 0, opacity: 1, duration: 1.0, ease: "power3.out" }, 1.0 + i * 1.0);
      });

      // After pillars, ring appears and swallows them
      tl.fromTo("#c6-ring", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.2, ease: "back.out(1.2)" }, 7.0);
      tl.fromTo("#c6-center", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.0, ease: "power3.out" }, 8.0);

      // Ring words pop
      var words = ["#c6-w1", "#c6-w2", "#c6-w3", "#c6-w4"];
      words.forEach(function(sel, i) {
        tl.fromTo(sel, { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.7, ease: "back.out(1.6)" }, 8.5 + i * 0.4);
      });

      // Pillars fade as ring takes over
      pillars.forEach(function(sel, i) {
        tl.to(sel, { opacity: 0.15, x: 60, duration: 1.0, ease: "power2.in" }, 11.0 + i * 0.2);
      });

      // Ring rotation ambient
      tl.to("#c6-ring", { rotation: 360, duration: 7, ease: "none", repeat: 0 }, 13.0);

      // Center pulse
      tl.to("#c6-center", { scale: 1.1, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 13.5);

      window.__timelines["cena-06"] = tl;
    </script>
