    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Photo entrance
      tl.fromTo(".bg-photo",
        { scale: 1.2, opacity: 0 },
        { scale: 1, opacity: 0.35, duration: 1.2, ease: "power3.out" },
        0
      );

      // Header entrance
      tl.fromTo(".header",
        { y: -40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" },
        0.3
      );

      // Title entrance
      tl.fromTo(".title",
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.8, ease: "expo.out" },
        0.7
      );

      // Status items entrance staggered
      tl.fromTo(".status-item",
        { x: -60, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.6, ease: "power3.out", stagger: 0.2 },
        1.2
      );

      // Icons pop staggered
      tl.fromTo(".status-icon",
        { scale: 0 },
        { scale: 1, duration: 0.4, ease: "back.out(2.5)", stagger: 0.2 },
        1.6
      );

      // Next steps entrance
      tl.fromTo(".next-steps",
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" },
        2.8
      );

      // Status items glow (extended repeats)
      tl.to(".status-item",
        { borderColor: "rgba(14, 106, 192, 0.7)", boxShadow: "0 0 30px rgba(14, 106, 192, 0.3)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3, stagger: 0.15 },
        3.5
      );

      // Header pulse (extended repeats)
      tl.to(".header",
        { textShadow: "0 0 20px rgba(134,229,255,0.5)", duration: 1.3, ease: "sine.inOut", yoyo: true, repeat: 5 },
        6.0
      );

      // Title breath (extended repeats)
      tl.to(".title",
        { scale: 1.02, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 4 },
        8.0
      );

      // Next steps glow (extended repeats)
      tl.to(".next-steps",
        { borderLeftColor: "#86e5ff", boxShadow: "0 0 25px rgba(134,229,255,0.3)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 4 },
        10.0
      );

      // Status icons pulse cycle
      tl.to(".status-icon",
        { scale: 1.1, color: "#ffffff", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 5, stagger: 0.1 },
        15.0
      );

      // Polaroid entrance
      tl.fromTo(".polaroid-08",
        { x: -120, rotation: -15, opacity: 0 },
        { x: 0, rotation: -3, opacity: 1, duration: 0.8, ease: "power3.out" },
        0.5
      );

      // Title final pulse
      tl.to(".title",
        { scale: 1.02, duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        26.0
      );

      // Photo slow zoom (extended to 27s — covers entire 28s scene)
      tl.to(".bg-photo",
        { scale: 1.1, duration: 27.0, ease: "none", overwrite: "auto" },
        1.0
      );

      window.__timelines["cena-08"] = tl;
    </script>
  </div>
