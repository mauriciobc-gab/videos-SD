<template id="cena-04-template">
  <div data-composition-id="cena-04" data-width="1920" data-height="1080">
    <img class="bg-photo" src="../assets/Tablets_lado_a_lado_com_a_solução_e_legado_de_terceiros.jpeg" />
    <div class="overlay"></div>
    <div class="polaroid polaroid-04">
      <img src="../assets/colaborador_realizando_testes_no_tablet.jpeg" />
      <div class="polaroid-label">Testes em andamento</div>
    </div>
    <div class="scene-content">
      <div class="title">Tablet Configurado</div>
      <div class="subtitle">Garagem da unidade • Pronto para uso</div>
      <div class="icon-wrapper">
        <div class="icon">✓</div>
      </div>
    </div>

    <style>
      .polaroid {
        position: absolute;
        background: #fff;
        padding: 10px 10px 36px 10px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.25);
        border-radius: 2px;
        z-index: 5;
      }
      .polaroid img {
        display: block;
        width: 100%;
        height: auto;
      }
      .polaroid-label {
        font-family: "Cabin", sans-serif;
        font-size: 12px;
        color: #555;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-top: 8px;
      }
      .polaroid-04 {
        width: 250px;
        right: 100px;
        top: 300px;
        transform: rotate(-2deg);
      }
      #cena-04 {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1e3460;
        font-family: "Satoshi Variable", sans-serif;
        color: #fdfbf4;
        position: relative;
      }
      .bg-photo {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.45;
      }
      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, rgba(30, 52, 96, 0.7), rgba(0, 105, 179, 0.8));
      }
      .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        padding: 120px 180px;
        box-sizing: border-box;
        background: rgba(30, 52, 96, 0.3);
      }
      .title {
        font-size: 96px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        text-align: center;
        line-height: 1;
      }
      .subtitle {
        font-size: 42px;
        font-weight: 600;
        text-align: center;
        color: #86e5ff;
        line-height: 1.3;
      }
      .icon-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: rgba(14, 106, 192, 0.2);
        border: 3px solid #0e6ac0;
        box-shadow: 0 0 50px rgba(14, 106, 192, 0.5);
      }
      .icon {
        font-size: 120px;
        font-weight: 900;
        color: #86e5ff;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Photo entrance
      tl.fromTo(".bg-photo",
        { scale: 1.1, opacity: 0 },
        { scale: 1, opacity: 0.45, duration: 1.0, ease: "power3.out" },
        0
      );

      // Title entrance
      tl.fromTo(".title",
        { y: 60, opacity: 0, scale: 0.9 },
        { y: 0, opacity: 1, scale: 1, duration: 0.8, ease: "expo.out" },
        0.3
      );

      // Subtitle entrance
      tl.fromTo(".subtitle",
        { y: 40, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" },
        0.7
      );

      // Icon wrapper entrance
      tl.fromTo(".icon-wrapper",
        { scale: 0, rotation: -180 },
        { scale: 1, rotation: 0, duration: 0.8, ease: "back.out(1.8)" },
        1.0
      );

      // Icon pop
      tl.fromTo(".icon",
        { scale: 0, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.4, ease: "back.out(2.5)" },
        1.4
      );

      // Icon wrapper pulse
      tl.to(".icon-wrapper",
        { boxShadow: "0 0 80px rgba(14, 106, 192, 0.8)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 2 },
        2.0
      );

      // Title breath
      tl.to(".title",
        { scale: 1.02, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 1 },
        4.5
      );

      // Subtitle glow
      tl.to(".subtitle",
        { textShadow: "0 0 20px rgba(134,229,255,0.4)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        5.5
      );

      // Icon rotation
      tl.to(".icon",
        { rotation: 360, duration: 2.0, ease: "power1.inOut" },
        6.0
      );

      // Polaroid entrance
      tl.fromTo(".polaroid-04",
        { x: 120, rotation: -15, opacity: 0 },
        { x: 0, rotation: -2, opacity: 1, duration: 0.8, ease: "power3.out" },
        0.5
      );

      // Subtitle pulse to end
      tl.to(".subtitle",
        { scale: 1.03, duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 },
        8.0
      );

      // Photo slow zoom (extended to end)
      tl.to(".bg-photo",
        { scale: 1.08, duration: 8.5, ease: "none", overwrite: "auto" },
        0.5
      );

      window.__timelines["cena-04"] = tl;
    </script>
  </div>
</template>
