<template id="cena-05-template">
  <div data-composition-id="cena-05" data-width="1920" data-height="1080">
    <video id="video-bg-c5" class="bg-video clip" data-start="0" data-duration="15" data-track-index="5" muted playsinline src="../assets/Colaborador_realiza_testes.mp4"></video>
    <div class="overlay"></div>
    <div class="scene-content">
      <div class="time-badge">10:57</div>
      <div class="title">Primeiros Testes</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-value">14</div>
          <div class="metric-label">Motoristas avaliados</div>
        </div>
        <div class="divider"></div>
        <div class="metric">
          <div class="metric-value">1:55</div>
          <div class="metric-label">Tempo médio por teste</div>
        </div>
      </div>
      <div class="tag">Processo estável • Adesão consistente</div>
    </div>

    <style>
      #cena-05 {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1e3460;
        font-family: "Satoshi Variable", sans-serif;
        color: #fdfbf4;
        position: relative;
      }
      .bg-video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.4;
      }
      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(30, 52, 96, 0.8) 0%, rgba(0, 105, 179, 0.75) 100%);
      }
      .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 48px;
        padding: 100px 160px;
        box-sizing: border-box;
        background: rgba(30, 52, 96, 0.4);
      }
      .time-badge {
        font-size: 48px;
        font-weight: 900;
        color: #86e5ff;
        padding: 16px 40px;
        background: rgba(14, 106, 192, 0.2);
        border: 2px solid rgba(14, 106, 192, 0.5);
        border-radius: 12px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .title {
        font-size: 88px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        text-align: center;
        line-height: 1;
      }
      .metrics {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 64px;
        padding: 48px 80px;
        background: rgba(14, 106, 192, 0.12);
        border: 2px solid rgba(14, 106, 192, 0.35);
        border-radius: 24px;
      }
      .metric {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .metric-value {
        font-size: 96px;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .metric-label {
        font-size: 24px;
        font-weight: 400;
        color: rgba(253, 251, 244, 0.85);
        text-align: center;
      }
      .divider {
        width: 2px;
        height: 120px;
        background: rgba(253, 251, 244, 0.3);
      }
      .tag {
        font-size: 28px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 18px 40px;
        border: 2px solid rgba(253, 251, 244, 0.3);
        border-radius: 12px;
        background: rgba(30, 52, 96, 0.85);
        text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Video entrance
      tl.fromTo(".bg-video",
        { scale: 1.15, opacity: 0 },
        { scale: 1, opacity: 0.4, duration: 1.2, ease: "power3.out" },
        0
      );

      // Time badge entrance
      tl.fromTo(".time-badge",
        { y: -40, opacity: 0, scale: 0.8 },
        { y: 0, opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.5)" },
        0.3
      );

      // Title entrance
      tl.fromTo(".title",
        { y: 50, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.8, ease: "expo.out" },
        0.7
      );

      // Metrics card entrance
      tl.fromTo(".metrics",
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.4)" },
        1.1
      );

      // Metric values count up
      const val1El = document.querySelectorAll(".metric-value")[0];
      const val2El = document.querySelectorAll(".metric-value")[1];
      
      const counter1 = { val: 0 };
      tl.to(counter1, {
        val: 14,
        duration: 1.5,
        ease: "power2.out",
        onUpdate: () => {
          val1El.textContent = Math.floor(counter1.val);
        }
      }, 1.5);

      // Second value types in as time
      tl.fromTo(val2El,
        { opacity: 0 },
        { opacity: 1, duration: 0.5, ease: "power2.out" },
        2.0
      );

      // Tag entrance
      tl.fromTo(".tag",
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" },
        2.5
      );

      // Metrics pulse
      tl.to(".metrics",
        { borderColor: "rgba(14, 106, 192, 0.7)", boxShadow: "0 0 40px rgba(14, 106, 192, 0.4)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3 },
        3.0
      );

      // Title breath
      tl.to(".title",
        { scale: 1.02, duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 2 },
        6.0
      );

      // Time badge pulse
      tl.to(".time-badge",
        { boxShadow: "0 0 30px rgba(14, 106, 192, 0.5)", backgroundColor: "rgba(14, 106, 192, 0.3)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 2 },
        8.0
      );

      // Metric values scale
      tl.to(".metric-value",
        { scale: 1.05, duration: 1.0, ease: "power1.inOut", yoyo: true, repeat: 2, stagger: 0.2 },
        10.0
      );

      // Time badge final pulse
      tl.to(".time-badge",
        { borderColor: "rgba(14, 106, 192, 0.7)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        13.0
      );

      // Video slow zoom (extended)
      tl.to(".bg-video",
        { scale: 1.1, duration: 14.0, ease: "none", overwrite: "auto" },
        1.0
      );

      window.__timelines["cena-05"] = tl;
    </script>
  </div>
</template>
