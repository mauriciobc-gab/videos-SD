<template id="cena-03-template">
  <div data-composition-id="cena-03" data-width="1920" data-height="1080">
    <img class="bg-photo" src="../assets/Apresentando_o_sistema.jpeg" />
    <div class="overlay"></div>
    <div class="polaroid polaroid-03">
      <img src="../assets/colaborador_clicando_na_tela.jpeg" />
      <div class="polaroid-label">Capacitação da equipe</div>
    </div>
    <div class="scene-content">
      <div class="header">DIA 1 — 14 DE ABRIL</div>
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-value">4</div>
        <div class="stat-label">COLABORADORES CAPACITADOS</div>
      </div>
      <div class="description">
        Garantindo <span class="highlight">alinhamento</span>, <span class="highlight">confiança</span> e <span class="highlight">domínio</span> desde o primeiro momento.
      </div>
    </div>

    <style>
      .polaroid {
        position: absolute;
        background: #fff;
        padding: 10px 10px 36px 10px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4), 0 2px 10px rgba(0,0,0,0.25);
        border-radius: 2px;
        z-index: 5;
      }
      .polaroid img {
        display: block;
        width: 100%;
        height: auto;
      }
      .polaroid-label {
        font-family: "Cabin", sans-serif;
        font-size: 12px;
        color: #555;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-top: 8px;
      }
      .polaroid-03 {
        width: 260px;
        right: 100px;
        top: 280px;
        transform: rotate(3deg);
      }
      #cena-03 {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1e3460;
        font-family: "Satoshi Variable", sans-serif;
        color: #fdfbf4;
        position: relative;
      }
      .bg-photo {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.35;
      }
      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 30% 50%, rgba(30, 52, 96, 0.75), rgba(0, 105, 179, 0.85));
      }
      .scene-content {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        padding: 100px 180px;
        box-sizing: border-box;
        background: rgba(30, 52, 96, 0.4);
      }
      .header {
        font-family: "Cabin", sans-serif;
        font-size: 32px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: #86e5ff;
        text-align: center;
      }
      .stat-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 48px 64px;
        background: rgba(14, 106, 192, 0.15);
        border: 2px solid rgba(14, 106, 192, 0.4);
        border-radius: 24px;
        box-shadow: 0 0 40px rgba(14, 106, 192, 0.3);
      }
      .stat-icon {
        font-size: 72px;
      }
      .stat-value {
        font-size: 120px;
        font-weight: 900;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .stat-label {
        font-size: 24px;
        font-weight: 400;
        color: rgba(253, 251, 244, 0.85);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        text-align: center;
      }
      .description {
        font-size: 32px;
        font-weight: 400;
        text-align: center;
        max-width: 1200px;
        line-height: 1.5;
        color: rgba(253, 251, 244, 0.9);
      }
      .highlight {
        color: #86e5ff;
        font-weight: 700;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Photo entrance
      tl.fromTo(".bg-photo",
        { scale: 1.15, opacity: 0 },
        { scale: 1, opacity: 0.35, duration: 1.0, ease: "power3.out" },
        0
      );

      // Header entrance
      tl.fromTo(".header",
        { y: -30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.6, ease: "power2.out" },
        0.3
      );

      // Card entrance
      tl.fromTo(".stat-card",
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.6)" },
        0.6
      );

      // Icon pop
      tl.fromTo(".stat-icon",
        { scale: 0 },
        { scale: 1, duration: 0.5, ease: "back.out(2)" },
        1.0
      );

      // Value count up
      const valueEl = document.querySelector(".stat-value");
      const counter = { val: 0 };
      tl.to(counter, {
        val: 4,
        duration: 1.2,
        ease: "power2.out",
        onUpdate: () => {
          valueEl.textContent = Math.floor(counter.val);
        }
      }, 1.2);

      // Label entrance
      tl.fromTo(".stat-label",
        { y: 20, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" },
        1.5
      );

      // Description entrance
      tl.fromTo(".description",
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.7, ease: "expo.out" },
        2.0
      );

      // Card glow pulse
      tl.to(".stat-card",
        { boxShadow: "0 0 60px rgba(14, 106, 192, 0.6)", duration: 1.5, ease: "sine.inOut", yoyo: true, repeat: 2 },
        2.5
      );

      // Header pulse
      tl.to(".header",
        { color: "#86e5ff", textShadow: "0 0 15px rgba(134,229,255,0.4)", duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 2 },
        5.5
      );

      // Icon bounce (extended)
      tl.to(".stat-icon",
        { y: -5, duration: 0.6, ease: "power1.inOut", yoyo: true, repeat: 4 },
        6.5
      );

      // Polaroid entrance
      tl.fromTo(".polaroid-03",
        { x: 100, rotation: 15, opacity: 0 },
        { x: 0, rotation: 3, opacity: 1, duration: 0.8, ease: "power3.out" },
        0.5
      );

      // Card pulse to end
      tl.to(".stat-card",
        { borderColor: "rgba(14, 106, 192, 0.6)", duration: 1.0, ease: "sine.inOut", yoyo: true, repeat: 1 },
        9.0
      );

      // Photo slow zoom (extended to end)
      tl.to(".bg-photo",
        { scale: 1.08, duration: 10.0, ease: "none" },
        1.0
      );

      window.__timelines["cena-03"] = tl;
    </script>
  </div>
</template>
