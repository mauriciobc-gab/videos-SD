</div>

<script>
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

function glitchTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.to(oldId, { skewX: 8, scale: 1.02, duration: 0.03, ease: "none" }, T);
  tl.to(oldId, { skewX: -6, scale: 0.99, duration: 0.03, ease: "none" }, T + 0.03);
  tl.to(oldId, { skewX: 4, scale: 1.01, duration: 0.03, ease: "none" }, T + 0.06);
  tl.to(oldId, { skewX: 0, scale: 0.95, autoAlpha: 0, filter: "blur(6px)", duration: half - 0.09, ease: "power2.in" }, T + 0.09);
  tl.set(newId, { opacity: 0, scale: 1.05, filter: "blur(6px)" }, T);
  tl.to(newId, { opacity: 1, scale: 1, filter: "blur(0px)", duration: half, ease: "power3.out" }, T + half);
}

function slideTransition(oldId, newId, T, dur, dir) {
  var half = dur / 2;
  var xOut = dir === "left" ? -1920 : dir === "right" ? 1920 : 0;
  var yOut = dir === "up" ? -1080 : dir === "down" ? 1080 : 0;
  var xIn = dir === "left" ? 1920 : dir === "right" ? -1920 : 0;
  var yIn = dir === "up" ? 1080 : dir === "down" ? -1080 : 0;
  tl.set(newId, { opacity: 0, x: xIn, y: yIn, filter: "blur(8px)", scale: 1 }, T);
  tl.to(oldId, { x: xOut, y: yOut, filter: "blur(8px)", autoAlpha: 0, duration: half, ease: "power3.in" }, T);
  tl.to(newId, { x: 0, y: 0, filter: "blur(0px)", opacity: 1, duration: half, ease: "power3.out" }, T + half);
}

function zoomTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.set(newId, { opacity: 0, scale: 0.6, filter: "blur(10px)" }, T);
  tl.set(oldId, { zIndex: 10 }, T);
  tl.to(oldId, { scale: 1.8, autoAlpha: 0, filter: "blur(10px)", duration: half, ease: "power3.in" }, T);
  tl.to(newId, { scale: 1, opacity: 1, filter: "blur(0px)", duration: half, ease: "power3.out" }, T + half);
  tl.set(oldId, { zIndex: "auto" }, T + dur);
  tl.set(newId, { zIndex: "auto" }, T + dur);
}

function crossfadeTransition(oldId, newId, T, dur) {
  var half = dur / 2;
  tl.set(newId, { opacity: 0, filter: "blur(4px)", scale: 1 }, T);
  tl.to(oldId, { autoAlpha: 0, filter: "blur(4px)", duration: half, ease: "power2.in" }, T);
  tl.to(newId, { opacity: 1, filter: "blur(0px)", duration: half, ease: "power2.out" }, T + half);
}

// Transitions
// C1 → C3 @ 17s: Crossfade (cena-01 runs 0–17s, DTI phase embedded inside it)
crossfadeTransition("#c1", "#c3", 17, 0.4);
// C3 → C4 @ 42s: Crossfade (phone persists in same position)
crossfadeTransition("#c3", "#c4", 42, 0.4);
// C4 → C5 @ 55s: Crossfade
crossfadeTransition("#c4", "#c5", 55, 0.4);
// C5 → C6 @ 67s: Crossfade (phone persists in same position)
crossfadeTransition("#c5", "#c6", 67, 0.4);
// C6 → C7 @ 81s: Crossfade (phone persists in same position)
crossfadeTransition("#c6", "#c7", 81, 0.4);
// C7 → C8 @ 94s: Crossfade
crossfadeTransition("#c7", "#c8", 94, 0.4);
// C8 → C9 @ 111s: Crossfade
crossfadeTransition("#c8", "#c9", 111, 0.5);

window.__timelines["main"] = tl;
</script>
